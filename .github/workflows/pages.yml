name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Add deployment timestamp
        shell: bash
        run: |
          cat > build-info.js <<EOF
          window.TUMBLEBLOCK_BUILD = {
            deployedAt: "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            commit: "${GITHUB_SHA:0:7}",
          };
          EOF
      - name: Cache-bust asset URLs
        shell: bash
        # Stamp every local .js/.css reference in index.html with the commit SHA so
        # each deploy busts the browser cache automatically. Source stays version-free;
        # no more hand-edited "?v=" tags.
        run: |
          sha="${GITHUB_SHA:0:7}"
          sed -E -i 's@(src|href)="([^":?]+\.(js|css))(\?v=[^"]*)?"@\1="\2?v='"$sha"'"@g' index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
